name: Validate on-chain agent economy

on:
  pull_request:
    paths:
      - "contracts/**"
      - "web/**"
      - "docs/agent-mint/**"
      - "scripts/check-runtime-hardcodes.mjs"
      - "scripts/validate-agent-mint.mjs"
      - ".github/workflows/validate-agent-economy.yml"
      - ".github/workflows/deploy-thesis-web.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install Foundry libraries
        working-directory: contracts
        run: forge install --no-git foundry-rs/forge-std
      - name: Compile Solidity
        working-directory: contracts
        shell: bash
        run: |
          set +e
          forge build > foundry-build.log 2>&1
          status=$?
          cat foundry-build.log
          exit $status
      - name: Upload Foundry build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-economy-foundry-build
          path: contracts/foundry-build.log
          if-no-files-found: error
      - name: Run market tests
        working-directory: contracts
        run: forge test --match-contract AgentServiceMarketTest -vv
      - name: Run credential minting tests
        working-directory: contracts
        run: forge test --match-contract AgentCredentialNFTTest -vv
      - name: Run Agent Card tests
        working-directory: contracts
        run: forge test --match-contract AgentCardNFTTest -vv

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reject embedded production configuration
        run: node scripts/check-runtime-hardcodes.mjs
      - name: Install THESIS dependencies
        working-directory: web
        run: pnpm install --ignore-workspace --no-frozen-lockfile
      - name: Run Agent Mint manifest gate
        working-directory: web
        run: node ../scripts/validate-agent-mint.mjs
      - name: Build THESIS web and Pages Functions
        working-directory: web
        run: pnpm run build
      - name: Verify release surfaces
        run: |
          test -f web/dist/index.html
          test -f web/functions/runtime-config.js
          test -f web/functions/rpc.js
          test -f 'web/functions/engine/[[path]].js'
          test -f contracts/src/AgentServiceMarket.sol
          test -f contracts/src/AgentCredentialNFT.sol
          test -f contracts/src/AgentCardNFT.sol
          test -f contracts/test/AgentServiceMarket.t.sol
          test -f contracts/test/AgentCredentialNFT.t.sol
          test -f contracts/test/AgentCardNFT.t.sol
          test -f web/src/AgentMintStudio.jsx
          test -f web/src/MintingStudio.jsx
          test -f web/src/ChainDecoder.jsx
          test -f web/src/chain/agentCards.js
          test -f web/src/chain/credentials.js
          test -f web/src/chain/economyDecoder.js
          test -f docs/agent-mint/README.md
          test -f docs/agent-mint/PROTOCOL.md
          test -f docs/agent-mint/WORKFLOWS_AND_USE_CASES.md
          test -f docs/agent-mint/RESEARCH_PAPER.md
