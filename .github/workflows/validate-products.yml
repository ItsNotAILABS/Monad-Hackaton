name: Validate products

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    name: Workspace typecheck and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck workspace
        shell: bash
        run: |
          set +e
          pnpm run typecheck > workspace-typecheck.log 2>&1
          status=$?
          cat workspace-typecheck.log
          exit $status
      - name: Upload workspace typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-typecheck-log
          path: workspace-typecheck.log
      - name: Build MonadBuilder+
        env:
          BASE_PATH: /
          VITE_PUBLIC_API_ORIGIN: ""
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/monad-builder run build > monadbuilder-build.log 2>&1
          status=$?
          cat monadbuilder-build.log
          exit $status
      - name: Upload MonadBuilder+ build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monadbuilder-build-log
          path: monadbuilder-build.log
      - name: Validate Cloudflare Worker
        working-directory: edge
        shell: bash
        run: |
          pnpm install --no-frozen-lockfile
          set +e
          pnpm exec wrangler deploy --dry-run > worker-dry-run.log 2>&1
          status=$?
          cat worker-dry-run.log
          exit $status
      - name: Upload Worker validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-validation-log
          path: edge/worker-dry-run.log

  thesis:
    name: Build THESIS Operations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install THESIS dependencies
        run: pnpm --dir web install --no-frozen-lockfile
      - name: Build THESIS Operations
        env:
          BASE_PATH: /
          VITE_API_URL: ""
        shell: bash
        run: |
          set +e
          pnpm --dir web run build > thesis-build.log 2>&1
          status=$?
          cat thesis-build.log
          exit $status
      - name: Upload THESIS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thesis-build-log
          path: thesis-build.log
