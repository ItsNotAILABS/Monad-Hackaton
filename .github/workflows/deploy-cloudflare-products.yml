name: Deploy Cloudflare products

on:
  workflow_run:
    workflows: ["Validate products"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Check deployment credentials
        id: credentials
        shell: bash
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deployment credentials are not configured; builds remain validated and deployment is skipped."
          fi
      - name: Install workspace dependencies
        if: steps.credentials.outputs.ready == 'true'
        run: pnpm install --no-frozen-lockfile
      - name: Build MonadBuilder+
        if: steps.credentials.outputs.ready == 'true'
        env:
          BASE_PATH: /
          VITE_PUBLIC_API_ORIGIN: https://monados.medinatechlabs.net
        run: pnpm --filter @workspace/monad-builder run build
      - name: Create MonadBuilder+ Pages project
        if: steps.credentials.outputs.ready == 'true'
        run: pnpm exec wrangler pages project create monadbuilder-plus --production-branch main || true
      - name: Deploy MonadBuilder+
        if: steps.credentials.outputs.ready == 'true'
        run: pnpm exec wrangler pages deploy artifacts/monad-builder/dist/public --project-name monadbuilder-plus --branch main
      - name: Install THESIS dependencies
        if: steps.credentials.outputs.ready == 'true'
        run: pnpm --dir web install --no-frozen-lockfile
      - name: Build THESIS Operations
        if: steps.credentials.outputs.ready == 'true'
        env:
          BASE_PATH: /
          VITE_API_URL: https://monados.medinatechlabs.net/engine
        run: pnpm --dir web run build
      - name: Create THESIS Pages project
        if: steps.credentials.outputs.ready == 'true'
        run: pnpm exec wrangler pages project create thesis-operations --production-branch main || true
      - name: Deploy THESIS Operations
        if: steps.credentials.outputs.ready == 'true'
        run: pnpm exec wrangler pages deploy web/dist --project-name thesis-operations --branch main
