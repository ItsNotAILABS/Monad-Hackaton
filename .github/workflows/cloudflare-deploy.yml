name: Deploy Cloudflare production gateway

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Validate deployment credentials
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build MonadBuilder+ static assets
        env:
          BASE_PATH: /
          VITE_PUBLIC_API_ORIGIN: ""
        run: pnpm --filter @workspace/monad-builder run build
      - name: Deploy Worker and static assets
        working-directory: edge
        run: pnpm install --no-frozen-lockfile && pnpm exec wrangler deploy
