name: Deploy configured THESIS web

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-thesis-web.yml"
      - "web/**"
      - "scripts/check-runtime-hardcodes.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: thesis-web-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      THESIS_API_URL: ${{ secrets.THESIS_API_URL }}
      THESIS_PROJECT_NAME: ${{ vars.THESIS_PAGES_PROJECT }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify publication configuration
        shell: bash
        run: |
          required=(CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN THESIS_API_URL THESIS_PROJECT_NAME)
          for key in "${required[@]}"; do
            test -n "${!key:-}" || { echo "Missing required secret or variable: $key"; exit 1; }
          done

      - name: Reject embedded production configuration
        run: node scripts/check-runtime-hardcodes.mjs

      - name: Verify Pages runtime bindings
        shell: bash
        run: |
          pnpm dlx wrangler@latest pages secret list --project-name "$THESIS_PROJECT_NAME" > pages-secrets.txt
          required=(THESIS_API_ORIGIN MONAD_RPC_URL MONAD_CHAIN_ID MONAD_NETWORK_NAME MONAD_NATIVE_SYMBOL AGENT_MARKET_ADDRESS RECEIPT_CHAIN_ADDRESS AGENT_REGISTRY_ADDRESS)
          for key in "${required[@]}"; do
            grep -q "$key" pages-secrets.txt || { echo "Pages runtime secret missing: $key"; exit 1; }
          done

      - name: Install THESIS dependencies
        working-directory: web
        run: pnpm install --ignore-workspace --no-frozen-lockfile

      - name: Build THESIS web
        working-directory: web
        env:
          BASE_PATH: /
          VITE_API_URL: ${{ env.THESIS_API_URL }}
        run: pnpm run build

      - name: Verify production package
        shell: bash
        run: |
          test -f web/dist/index.html
          test -d web/dist/assets
          test -f web/functions/runtime-config.js
          test -f web/functions/rpc.js
          test -f 'web/functions/engine/[[path]].js'

      - name: Deploy THESIS web and Pages Functions
        working-directory: web
        shell: bash
        run: |
          set -o pipefail
          pnpm dlx wrangler@latest pages deploy dist \
            --project-name "$THESIS_PROJECT_NAME" \
            --branch main \
            --commit-hash "$GITHUB_SHA" | tee "$GITHUB_WORKSPACE/thesis-pages-deploy.log"

      - name: Write deployment receipt
        if: always()
        shell: bash
        run: |
          deployment_url=$(grep -Eo 'https://[^ ]+\.pages\.dev' thesis-pages-deploy.log 2>/dev/null | tail -1 || true)
          jq -n \
            --arg schema "thesis.web.deployment.v2" \
            --arg commit "$GITHUB_SHA" \
            --arg workflow "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg pagesProject "$THESIS_PROJECT_NAME" \
            --arg deploymentUrl "$deployment_url" \
            '{schema:$schema,commit:$commit,workflow:$workflow,pagesProject:$pagesProject,deploymentUrl:$deploymentUrl}' \
            > thesis-web-deployment.json

      - name: Upload deployment receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thesis-web-deployment-receipt
          path: |
            pages-secrets.txt
            thesis-pages-deploy.log
            thesis-web-deployment.json
          if-no-files-found: warn
