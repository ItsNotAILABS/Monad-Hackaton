openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Monad App Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: dApp project management
  - name: templates
    description: Template library
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/publish:
    post:
      operationId: publishProject
      tags: [projects]
      summary: Publish a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/unpublish:
    post:
      operationId: unpublishProject
      tags: [projects]
      summary: Unpublish a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unpublished project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all templates
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [defi, nft, dao, token, portfolio, custom]
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ComponentData:
      type: object
      description: A UI component in the canvas
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - wallet-connect
            - token-balance
            - nft-gallery
            - transaction-feed
            - token-swap
            - price-chart
            - dao-vote
            - heading
            - paragraph
            - button
            - image
            - divider
            - hero-section
            - card
            - stats-row
        props:
          type: object
          additionalProperties: true
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        order:
          type: integer
      required:
        - id
        - type
        - props
        - order

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        templateId:
          type: integer
          nullable: true
        components:
          type: array
          items:
            $ref: "#/components/schemas/ComponentData"
        theme:
          type: object
          properties:
            primaryColor:
              type: string
            backgroundColor:
              type: string
            fontFamily:
              type: string
          additionalProperties: true
        status:
          type: string
          enum: [draft, published]
        publishedSlug:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - components
        - theme
        - status
        - createdAt
        - updatedAt

    CreateProjectInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        templateId:
          type: integer
          nullable: true
      required:
        - name
        - description

    UpdateProjectInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/ComponentData"
        theme:
          type: object
          additionalProperties: true

    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [defi, nft, dao, token, portfolio, custom]
        thumbnailUrl:
          type: string
          nullable: true
        components:
          type: array
          items:
            $ref: "#/components/schemas/ComponentData"
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - category
        - components
        - isDefault
        - createdAt

    DashboardStats:
      type: object
      properties:
        totalProjects:
          type: integer
        publishedProjects:
          type: integer
        draftProjects:
          type: integer
        totalTemplates:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - totalProjects
        - publishedProjects
        - draftProjects
        - totalTemplates
        - recentProjects
