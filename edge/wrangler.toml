# MonadBuilder HQ — Cloudflare Workers edge agents
# Deploy: cd edge && npx wrangler deploy
name = "monadbuilder-edge"
main = "src/router.js"
compatibility_date = "2024-11-01"

[vars]
ORIGIN_API = "https://monados.medinatechlabs.net/engine"
PUBLIC_APP_URL = "https://monados.medinatechlabs.net"
SYNTHETIC_TARGET = "https://monados.medinatechlabs.net"
SYNTHETIC_CADENCE = "smoke"
PRODUCT = "MonadBuilder HQ"
DOCTRINE = "Agents propose. Laws decide. Owner signs. Receipts remember."
EDGE_REGION_HINT = "auto"

# Configure as secrets where applicable:
# wrangler secret put SYNTHETIC_RUN_TOKEN
# wrangler secret put ETHEREUM_RPC_URL
# Optional: THESIS_URL, EDGE_PUBLIC_URL, OPENAI_API_KEY, XAI_API_KEY,
# ANTHROPIC_API_KEY, CF_AI_GATEWAY_URL

[triggers]
crons = ["*/30 * * * *"]

[observability]
enabled = true
